## Starship prompt config
## Docs: https://starship.rs/config/

format = "$directory$git_branch$git_status$character"
right_format = "$username$hostname"

[character]
success_symbol = "[>](bold green)"
error_symbol   = "[>](bold red)"

[directory]
truncation_length   = 5
truncate_to_repo    = false
style               = "bold cyan"
format              = "[$path]($style) "

[git_branch]
symbol = ""
style  = "bold purple"
format = "[$branch]($style) "

[git_status]
format     = "([$ahead_behind$all_status]($style) )"
style      = "bold yellow"
ahead      = ">${count}"
behind     = "<${count}"
diverged   = "⇕${ahead_count}${behind_count}"
modified   = "!${count}"
untracked  = "?"
staged     = "+"
deleted    = "✘"
renamed    = "»"
stashed    = ""

[username]
show_always = true
style_user  = "bold yellow"
format      = "[$user]($style)@"

[hostname]
ssh_only = false
style    = "bold yellow"
format   = "[$hostname]($style)"

[cmd_duration]
min_time = 2000
format   = "[$duration](bold yellow) "

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true
