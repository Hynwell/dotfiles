## Starship prompt config
## Docs: https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "bold cyan"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style      = "bold red"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[username]
show_always = false
style_user  = "bold yellow"
format      = "[$user]($style)@"

[hostname]
ssh_only = true
style    = "bold yellow"
format   = "[$hostname]($style) "

[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true
