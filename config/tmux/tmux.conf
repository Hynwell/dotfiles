## tmux config

# Prefix: Ctrl+b (default)

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Mouse: scroll and click
set -g mouse on

# Big scrollback buffer
set -g history-limit 50000

# Start windows and panes from 1 (easier keyboard reach)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reduce escape delay (important for vim/neovim)
set -sg escape-time 10

# Status bar
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left  "#[bold,fg=#89b4fa] #S "
set -g status-right "#[fg=#a6adc8] %H:%M  %d %b "
set -g window-status-current-style "bold,fg=#89dceb"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes with prefix+arrow
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# vi mode in copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
